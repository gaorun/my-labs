name: Bug Report
description: 报告一个 bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 bug！请填写以下信息帮助我们更好地理解和解决问题。

  - type: dropdown
    id: skill
    attributes:
      label: 相关技能
      description: 这个 bug 与哪个技能相关？
      options:
        - bear-automation
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 bug
      placeholder: 描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 执行命令 '...'
        2. 看到错误 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 描述期望的行为...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 描述实际的行为...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请提供你的环境信息
      placeholder: |
        - OS: [e.g. macOS 14.0]
        - Python 版本: [e.g. 3.11]
        - Shell: [e.g. zsh]
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 其他任何有助于解决问题的信息
      placeholder: 截图、日志、相关链接等...
    validations:
      required: false
