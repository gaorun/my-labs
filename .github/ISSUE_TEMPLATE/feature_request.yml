name: Feature Request
description: 建议一个新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请填写以下信息帮助我们理解你的需求。

  - type: dropdown
    id: type
    attributes:
      label: 功能类型
      description: 这是什么类型的功能？
      options:
        - 新技能
        - 现有技能改进
        - 文档改进
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你想解决什么问题？
      placeholder: 描述你遇到的问题或需求...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 你希望如何解决这个问题？
      placeholder: 描述你建议的解决方案...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他解决方案吗？
      placeholder: 描述你考虑过的其他方案...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 其他任何有助于理解需求的信息
      placeholder: 示例、截图、相关链接等...
    validations:
      required: false
