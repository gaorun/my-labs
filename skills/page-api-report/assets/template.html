<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{PAGE_TITLE}} · 页面接口发现报告</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200..700&family=JetBrains+Mono:wght@400..600&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ── Swiss Design Tokens ── */
            :root {
                --paper: #f4f5f7;
                --surface: #ffffff;
                --ink: #1a1a1a;
                --ink-secondary: #555558;
                --ink-muted: #8a8a8e;
                --hairline: #dcdce0;
                --hairline-sub: #eaeaee;
                --accent: #002fa7; /* IKB */
                --accent-rgb: 0, 47, 167;
                --accent-soft: #e6ebf5;
                --accent-text: #001f70;
                --tag-bg: #ebedf0;
                --tag-text: #4a4d52;

                /* HTTP method colors — desaturated for Swiss palette */
                --method-get: #1a8a4a;
                --method-post: #1a5cc7;
                --method-put: #c7850a;
                --method-delete: #c72a2a;

                /* spacing tokens */
                --sp-3: 8px;
                --sp-4: 12px;
                --sp-5: 16px;
                --sp-6: 24px;
                --sp-7: 32px;
                --sp-8: 40px;
                --sp-9: 48px;
                --sp-10: 64px;

                --col-w: calc((100vw - var(--sp-6) * 2) / 12);
            }

            /* ── Reset ── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            /* ── Dot-pattern background ── */
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    "PingFang SC",
                    "Microsoft YaHei UI",
                    "Noto Sans SC",
                    sans-serif;
                background: var(--paper);
                color: var(--ink);
                line-height: 1.55;
                font-weight: 400;
                font-size: 15px;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                /* subtle dot pattern via radial-gradient */
                background-image: radial-gradient(
                    circle,
                    rgba(0, 0, 0, 0.04) 1px,
                    transparent 1px
                );
                background-size: 20px 20px;
            }

            .container {
                max-width: 1180px;
                margin: 0 auto;
                padding: var(--sp-10) var(--sp-6) var(--sp-10);
            }

            /* ═══════════ HEADER ═══════════ */
            .report-header {
                background: var(--surface);
                padding: var(--sp-8) var(--sp-8);
                margin-bottom: var(--sp-7);
                border-left: 3px solid var(--accent);
            }
            .report-header .label {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                color: var(--accent);
                margin-bottom: var(--sp-3);
            }
            .report-header h1 {
                font-size: min(5.2vw, 36px);
                font-weight: 200;
                color: var(--ink);
                line-height: 1.15;
                letter-spacing: -0.02em;
                margin-bottom: var(--sp-5);
            }
            .report-header .meta {
                display: flex;
                flex-wrap: wrap;
                gap: var(--sp-6);
                font-size: 13px;
                font-weight: 400;
                color: var(--ink-secondary);
            }
            .report-header .meta-item {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .report-header .meta-item strong {
                color: var(--ink);
                font-weight: 600;
            }

            /* ═══════════ SECTION ═══════════ */
            .section {
                background: var(--surface);
                padding: var(--sp-8);
                margin-bottom: var(--sp-7);
                border-top: 1px solid var(--hairline);
            }
            .section h2 {
                font-size: 18px;
                font-weight: 500;
                letter-spacing: -0.01em;
                color: var(--ink);
                margin-bottom: var(--sp-3);
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .section h2 .step-num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 24px;
                height: 24px;
                background: var(--accent);
                color: #fff;
                font-size: 12px;
                font-weight: 600;
                flex-shrink: 0;
            }
            .section .subtitle {
                font-size: 13px;
                color: var(--ink-muted);
                font-weight: 400;
                margin-bottom: var(--sp-7);
            }

            /* ═══════════ API CARD ═══════════ */
            .api-card {
                margin-bottom: var(--sp-7);
                border: 1px solid var(--hairline);
            }
            .api-card:last-child {
                margin-bottom: 0;
            }

            .api-card-header {
                display: flex;
                align-items: center;
                gap: var(--sp-4);
                padding: var(--sp-5) var(--sp-6);
                border-bottom: 1px solid var(--hairline);
            }
            .api-card-header .api-index {
                font-family:
                    "JetBrains Mono", "SF Mono", "Fira Code", monospace;
                font-size: 12px;
                font-weight: 500;
                color: var(--ink-muted);
                min-width: 24px;
            }
            .api-method {
                display: inline-block;
                padding: 2px 10px;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.05em;
                color: #fff;
                min-width: 52px;
                text-align: center;
                flex-shrink: 0;
            }
            .api-method.get {
                background: var(--method-get);
            }
            .api-method.post {
                background: var(--method-post);
            }
            .api-method.put {
                background: var(--method-put);
            }
            .api-method.delete {
                background: var(--method-delete);
            }

            .api-path {
                font-family:
                    "JetBrains Mono", "SF Mono", "Fira Code", monospace;
                font-size: 13px;
                font-weight: 500;
                color: var(--ink);
                word-break: break-all;
            }

            .api-card-body {
                padding: var(--sp-6);
            }

            .api-card-body .trigger {
                font-size: 14px;
                color: var(--ink-secondary);
                font-weight: 400;
                margin-bottom: var(--sp-6);
                padding: var(--sp-4) var(--sp-5);
                background: var(--accent-soft);
                border-left: 2px solid var(--accent);
            }
            .api-card-body .trigger::before {
                content: "调用时机  ";
                font-weight: 600;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--accent-text);
            }

            /* ═══════════ SUB-SECTIONS ═══════════ */
            .api-sub {
                margin-bottom: var(--sp-6);
            }
            .api-sub:last-child {
                margin-bottom: 0;
            }
            .api-sub h4 {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--ink-muted);
                margin-bottom: var(--sp-4);
                display: flex;
                align-items: center;
                gap: var(--sp-3);
            }
            .api-sub h4::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--hairline);
            }

            /* ═══════════ TABLES ═══════════ */
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
                font-weight: 400;
            }
            th,
            td {
                padding: 10px 14px;
                text-align: left;
                border-bottom: 1px solid var(--hairline-sub);
                vertical-align: top;
            }
            th {
                font-weight: 600;
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--ink-muted);
                border-bottom: 1px solid var(--hairline);
            }
            tr:last-child td {
                border-bottom: none;
            }

            td.field {
                font-family:
                    "JetBrains Mono", "SF Mono", "Fira Code", monospace;
                font-size: 12px;
                font-weight: 500;
                color: var(--accent-text);
            }

            /* ═══════════ ENUM BADGES ═══════════ */
            .enum-badge {
                display: inline-block;
                padding: 1px 8px;
                font-size: 11px;
                font-weight: 500;
                background: var(--tag-bg);
                color: var(--tag-text);
                margin: 2px 3px;
                white-space: nowrap;
            }

            .fallback-text {
                font-size: 12px;
                color: var(--ink-muted);
                font-weight: 400;
            }

            /* ═══════════ CACHE SECTION ═══════════ */
            .cache-item {
                padding: var(--sp-4) var(--sp-5);
                margin-bottom: var(--sp-3);
                font-size: 13px;
                font-weight: 400;
                color: var(--ink-secondary);
                border: 1px solid var(--hairline);
                border-left: 2px solid var(--accent);
            }
            .cache-item:last-child {
                margin-bottom: 0;
            }
            .cache-item .cache-label {
                font-weight: 600;
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--ink-muted);
                display: block;
                margin-bottom: 4px;
            }

            /* ═══════════ SEQUENCE DIAGRAM ═══════════ */
            .seq-section {
                background: var(--surface);
                padding: var(--sp-8);
                margin-top: var(--sp-7);
                border-top: 1px solid var(--hairline);
            }
            .seq-section h2 {
                font-size: 18px;
                font-weight: 500;
                letter-spacing: -0.01em;
                margin-bottom: var(--sp-6);
            }
            .seq-diagram {
                overflow-x: auto;
                padding: var(--sp-5) 0;
            }
            .seq-diagram svg {
                display: block;
                margin: 0 auto;
                min-width: 700px;
            }

            /* ═══════════ FOOTER ═══════════ */
            .report-footer {
                text-align: center;
                padding: var(--sp-9) 0 0;
                font-size: 12px;
                font-weight: 400;
                color: var(--ink-muted);
                border-top: 1px solid var(--hairline);
                margin-top: var(--sp-5);
            }

            /* ═══════════ PRINT ═══════════ */
            @media print {
                body {
                    background: #fff;
                    background-image: none;
                }
                .container {
                    max-width: 100%;
                    padding: 0;
                }
                .section,
                .report-header,
                .seq-section {
                    border: 1px solid #ccc;
                    break-inside: avoid;
                    margin-bottom: 16px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- ═══════════ HEADER ═══════════ -->
            <div class="report-header">
                <div class="label">页面接口发现报告</div>
                <h1>{{PAGE_TITLE}}</h1>
                <div class="meta">
                    <div class="meta-item">
                        路由&nbsp;<strong>{{PAGE_ROUTE}}</strong>
                    </div>
                    <div class="meta-item">
                        项目&nbsp;<strong>{{PROJECT_NAME}}</strong>
                    </div>
                    <div class="meta-item">
                        框架&nbsp;<strong>{{FRAMEWORK}}</strong>
                    </div>
                    <div class="meta-item">
                        接口&nbsp;<strong>{{TOTAL_APIS}}</strong>
                    </div>
                    <div class="meta-item">{{ANALYSIS_TIME}}</div>
                </div>
            </div>

            <!-- ═══════════ API FLOW ═══════════ -->
            <div class="section">
                <h2>接口调用链路</h2>
                <div class="subtitle">
                    按用户操作动线顺序排列，从页面进入到用户交互
                </div>
                {{API_CARDS}}
            </div>

            <!-- ═══════════ CACHE & POLLING ═══════════ -->
            {{CACHE_SECTION}}

            <!-- ═══════════ SEQUENCE DIAGRAM ═══════════ -->
            <div class="seq-section">
                <h2>用户 — 前端 — 后端 &nbsp;时序图</h2>
                <div class="seq-diagram">{{SEQUENCE_SVG}}</div>
            </div>

            <!-- ═══════════ FOOTER ═══════════ -->
            <div class="report-footer">
                page-api-report &nbsp;·&nbsp; {{ANALYSIS_TIME}}
            </div>
        </div>
    </body>
</html>
